{# Game control buttons fragment - can be loaded via HTMX #}
{% load i18n %}
{# CSRF token is provided by parent container #}

{% if room_code %}
    {% if is_master %}
        <button id="startButton"
                hx-post="{% url 'game:start_game' %}"
                hx-target="#startButton"
                hx-swap="none"
                hx-include="#roundTimerSettings, [name='csrfmiddlewaretoken']"
                hx-on::htmx:config-request="syncRoundTimerHiddenFields()"
                hx-on::htmx:after-request="handleStartGameResponse(event)">{% trans "Runde starten" %}</button>

        <button id="stopButton"
                hx-post="{% url 'game:start_game' %}"
                hx-target="#stopButton"
                hx-swap="none"
                hx-vals='{"action": "stop"}'
                hx-include="#roundTimerSettings, [name='csrfmiddlewaretoken']"
                hx-on::htmx:config-request="syncRoundTimerHiddenFields()"
                hx-on::htmx:after-request="handleStopGameResponse(event)"
                class="inactive">{% trans "Runde stoppen" %}</button>
    {% else %}
        <button id="startButton" disabled style="opacity: 0.5; cursor: not-allowed; background-color: #6c757d !important; color: white !important; pointer-events: none !important;">{% trans "Runde starten" %}</button>
        <button id="stopButton" disabled style="opacity: 0.5; cursor: not-allowed; background-color: #6c757d !important; color: white !important; pointer-events: none !important;" class="inactive">{% trans "Runde stoppen" %}</button>
        <p style="font-size: 0.85em; color: #666; margin-top: 5px;">{% trans "Nur der Rallye-Leiter kann die Runde starten oder stoppen." %}</p>
    {% endif %}
{% else %}
    <button id="startButton"
            hx-post="{% url 'game:start_game' %}"
            hx-target="#startButton"
            hx-swap="none"
            hx-include="#roundTimerSettings, [name='csrfmiddlewaretoken']"
            hx-on::htmx:config-request="syncRoundTimerHiddenFields()"
            hx-on::htmx:after-request="handleStartGameResponse(event)">{% trans "Runde starten" %}</button>

    <button id="stopButton"
            hx-post="{% url 'game:start_game' %}"
            hx-target="#stopButton"
            hx-swap="none"
            hx-vals='{"action": "stop"}'
            hx-include="#roundTimerSettings, [name='csrfmiddlewaretoken']"
            hx-on::htmx:config-request="syncRoundTimerHiddenFields()"
            hx-on::htmx:after-request="handleStopGameResponse(event)"
            class="inactive">{% trans "Runde stoppen" %}</button>
{% endif %}
