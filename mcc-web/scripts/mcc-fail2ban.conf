# MyCyclingCity Fail2ban Jail-Konfiguration
# 
# Installation:
#   sudo cp /data/appl/mcc/mcc-web/scripts/mcc-fail2ban.conf /etc/fail2ban/jail.d/mcc.conf
#   sudo cp /data/appl/mcc/mcc-web/scripts/filter.d/mcc-*.conf /etc/fail2ban/filter.d/
#   sudo systemctl reload fail2ban
#
# Test:
#   sudo fail2ban-client status mcc-django-auth
#   sudo fail2ban-client get mcc-django-auth logpath
#
# Logs prüfen:
#   sudo fail2ban-client status mcc-django-auth
#   sudo fail2ban-client get mcc-django-auth banned
#   sudo fail2ban-client unban <IP> -j mcc-django-auth

[DEFAULT]
# Standardwerte für alle MCC-Jails
bantime = 3600          # 1 Stunde Bann
findtime = 600          # 10 Minuten Zeitfenster
maxretry = 5            # 5 Versuche innerhalb des Zeitfensters
backend = systemd       # Oder 'auto' für automatische Erkennung

# E-Mail-Benachrichtigungen aktivieren (optional):
# Fügen Sie in /etc/fail2ban/jail.local hinzu:
# [DEFAULT]
# destemail = admin@example.com
# sendername = Fail2ban
# Dann ändern Sie 'action = %(action_)s' zu:
# action = %(action_)s
#          %(action_mwl)s[sender=fail2ban@%(hostname)s, dest=%(destemail)s, logpath=%(logpath)s]

[mcc-django-auth]
# Blockiert IPs bei fehlgeschlagenen Authentifizierungsversuchen
enabled = true
port = http,https
filter = mcc-django-auth
logpath = /data/var/mcc/logs/django.log
          /data/var/mcc/logs/gunicorn_access.log
maxretry = 5
findtime = 600
bantime = 3600
action = %(action_)s

[mcc-django-scanner]
# Blockiert IPs die viele 404-Fehler verursachen (Scanner/Prober)
enabled = true
port = http,https
filter = mcc-django-scanner
logpath = /data/var/mcc/logs/gunicorn_access.log
maxretry = 10
findtime = 300
bantime = 1800
action = %(action_)s

[mcc-django-attack]
# Blockiert IPs bei Angriffsversuchen (SQL-Injection, XSS, etc.)
enabled = true
port = http,https
filter = mcc-django-attack
logpath = /data/var/mcc/logs/django.log
          /data/var/mcc/logs/gunicorn_access.log
          /data/var/mcc/logs/api.log
maxretry = 3
findtime = 600
bantime = 86400          # 24 Stunden Bann für Angriffe
action = %(action_)s

[mcc-django-bruteforce]
# Blockiert IPs bei Bruteforce-Angriffen (viele 403/401 in kurzer Zeit)
enabled = true
port = http,https
filter = mcc-django-bruteforce
logpath = /data/var/mcc/logs/gunicorn_access.log
          /data/var/mcc/logs/django.log
maxretry = 10
findtime = 300
bantime = 7200           # 2 Stunden Bann
action = %(action_)s

[mcc-gunicorn-error]
# Blockiert IPs die viele 500-Fehler verursachen (mögliche Angriffe)
enabled = true
port = http,https
filter = mcc-gunicorn-error
logpath = /data/var/mcc/logs/gunicorn_error.log
          /data/var/mcc/logs/django.log
maxretry = 5
findtime = 600
bantime = 3600
action = %(action_)s
