# MyCyclingCity Fail2ban Jail-Konfiguration für Apache
# 
# Diese Konfiguration überwacht Apache-Logs (empfohlen für Production)
# Apache läuft als Reverse Proxy vor Gunicorn und sieht die originalen Client-IPs
#
# Installation:
#   sudo cp /data/appl/mcc/mcc-web/scripts/mcc-fail2ban-apache.conf /etc/fail2ban/jail.d/mcc-apache.conf
#   sudo cp /data/appl/mcc/mcc-web/scripts/filter.d/mcc-apache-*.conf /etc/fail2ban/filter.d/
#   sudo systemctl reload fail2ban
#
# Test:
#   sudo fail2ban-client status mcc-apache-auth
#   sudo fail2ban-client get mcc-apache-auth logpath

[DEFAULT]
# Standardwerte für alle MCC-Apache-Jails
bantime = 3600          # 1 Stunde Bann
findtime = 600          # 10 Minuten Zeitfenster
maxretry = 5            # 5 Versuche innerhalb des Zeitfensters
backend = systemd       # Oder 'auto' für automatische Erkennung

# E-Mail-Benachrichtigungen aktivieren (optional):
# Fügen Sie in /etc/fail2ban/jail.local hinzu:
# [DEFAULT]
# destemail = admin@example.com
# sendername = Fail2ban
# Dann ändern Sie 'action = %(action_)s' zu:
# action = %(action_)s
#          %(action_mwl)s[sender=fail2ban@%(hostname)s, dest=%(destemail)s, logpath=%(logpath)s]

[mcc-apache-auth]
# Blockiert IPs bei fehlgeschlagenen Authentifizierungsversuchen (401/403)
enabled = true
port = http,https
filter = mcc-apache-auth
logpath = /var/log/apache2/MCC_ssl_access_log.*
          /var/log/apache2/MCC_access_log.*
maxretry = 5
findtime = 600
bantime = 3600
action = %(action_)s

[mcc-apache-scanner]
# Blockiert IPs die viele 404-Fehler verursachen (Scanner/Prober)
enabled = true
port = http,https
filter = mcc-apache-scanner
logpath = /var/log/apache2/MCC_ssl_access_log.*
          /var/log/apache2/MCC_access_log.*
maxretry = 10
findtime = 300
bantime = 1800
action = %(action_)s

[mcc-apache-attack]
# Blockiert IPs bei Angriffsversuchen (SQL-Injection, XSS, etc.)
enabled = true
port = http,https
filter = mcc-apache-attack
logpath = /var/log/apache2/MCC_ssl_access_log.*
          /var/log/apache2/MCC_access_log.*
          /var/log/apache2/MCC_ssl_error_log.*
          /var/log/apache2/MCC_error_log.*
maxretry = 3
findtime = 600
bantime = 86400          # 24 Stunden Bann für Angriffe
action = %(action_)s

[mcc-apache-bruteforce]
# Blockiert IPs bei Bruteforce-Angriffen (viele 403/401 in kurzer Zeit)
enabled = true
port = http,https
filter = mcc-apache-bruteforce
logpath = /var/log/apache2/MCC_ssl_access_log.*
          /var/log/apache2/MCC_access_log.*
maxretry = 10
findtime = 300
bantime = 7200           # 2 Stunden Bann
action = %(action_)s

[mcc-apache-badbots]
# Blockiert bekannte Bad Bots und Scrapers
enabled = true
port = http,https
filter = mcc-apache-badbots
logpath = /var/log/apache2/MCC_ssl_access_log.*
          /var/log/apache2/MCC_access_log.*
maxretry = 2
findtime = 86400
bantime = 86400          # 24 Stunden Bann
action = %(action_)s

[mcc-apache-noscript]
# Blockiert IPs die versuchen, Scripts/Dateien zu scannen
enabled = true
port = http,https
filter = mcc-apache-noscript
logpath = /var/log/apache2/MCC_ssl_access_log.*
          /var/log/apache2/MCC_access_log.*
maxretry = 6
findtime = 300
bantime = 86400          # 24 Stunden Bann
action = %(action_)s
