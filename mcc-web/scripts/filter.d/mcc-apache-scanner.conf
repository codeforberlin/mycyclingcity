# Fail2ban filter für Scanner/Prober (viele 404-Fehler) in Apache-Logs
# 
# Erkennt IPs die viele 404-Fehler verursachen (typisch für Scanner)

[Definition]
# Apache Access-Log Format: %h %l %u %t "%r" %>s %b
# 404-Fehler in Apache Access-Logs
failregex = ^<HOST>.*"GET /.*" 404 .*$
            ^<HOST>.*"POST /.*" 404 .*$
            ^<HOST>.*"HEAD /.*" 404 .*$
            ^<HOST>.*"GET /.*" 404$
            ^<HOST>.*"POST /.*" 404$

# Ignoriere normale 404s für statische Dateien, Favicon, etc.
ignoreregex = ^<HOST>.*"GET /static/.*" 404 .*$
              ^<HOST>.*"GET /media/.*" 404 .*$
              ^<HOST>.*"GET /favicon\.ico.*" 404 .*$
              ^<HOST>.*"GET /robots\.txt.*" 404 .*$
              ^<HOST>.*"GET /sitemap\.xml.*" 404 .*$
              ^<HOST>.*"GET /static/.*" 404$
              ^<HOST>.*"GET /media/.*" 404$
