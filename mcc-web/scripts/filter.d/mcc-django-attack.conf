# Fail2ban filter für Angriffsversuche (SQL-Injection, XSS, etc.)
# 
# Erkennt:
# - SQL-Injection-Versuche
# - XSS-Versuche
# - Path-Traversal-Versuche
# - Command-Injection-Versuche
# - Suspicious Request Patterns

[Definition]
# SQL-Injection Patterns in Request-URLs
failregex = ^<HOST>.*".*UNION.*SELECT.*".*$
            ^<HOST>.*".*OR.*1=1.*".*$
            ^<HOST>.*".*';.*DROP.*TABLE.*".*$
            ^<HOST>.*".*EXEC.*\(.*".*$
            ^<HOST>.*".*xp_cmdshell.*".*$
            ^<HOST>.*".*UNION.*ALL.*SELECT.*".*$
            ^<HOST>.*".*CONCAT.*\(.*".*$
            ^<HOST>.*".*\?.*=.*UNION.*".*$
            ^<HOST>.*".*\?.*=.*SELECT.*FROM.*".*$

# XSS Patterns in Request-URLs
            ^<HOST>.*".*<script.*>.*".*$
            ^<HOST>.*".*javascript:.*".*$
            ^<HOST>.*".*onerror=.*".*$
            ^<HOST>.*".*onload=.*".*$
            ^<HOST>.*".*onclick=.*".*$
            ^<HOST>.*".*alert\(.*\).*".*$
            ^<HOST>.*".*eval\(.*\).*".*$

# Path Traversal
            ^<HOST>.*".*\.\./.*".*$
            ^<HOST>.*".*\.\.\\\.\.\\\.\.\\\.\..*".*$
            ^<HOST>.*".*/etc/passwd.*".*$
            ^<HOST>.*".*/proc/self/environ.*".*$

# Command Injection
            ^<HOST>.*".*;.*ls.*".*$
            ^<HOST>.*".*\|.*cat.*".*$
            ^<HOST>.*".*`.*whoami.*`.*".*$
            ^<HOST>.*".*\$\(.*\).*".*$

# Suspicious Request Patterns
            ^<HOST>.*".*wp-admin.*".*$
            ^<HOST>.*".*phpmyadmin.*".*$
            ^<HOST>.*".*\.env.*".*$
            ^<HOST>.*".*\.git.*".*$
            ^<HOST>.*".*\.sql.*".*$

# Django Security Warnings (ohne IP, da IP nicht im Log steht)
            ^.*\[WARNING\].*SuspiciousOperation.*$
            ^.*\[ERROR\].*DisallowedHost.*$
            ^.*\[WARNING\].*Invalid HTTP_HOST.*$

ignoreregex =
