# Fail2ban filter für bekannte Bad Bots und Scrapers in Apache-Logs
# 
# Erkennt bekannte bösartige Bots und Scrapers

[Definition]
# Apache Access-Log Format: %h %l %u %t "%r" %>s %b
# User-Agent ist im Request enthalten, aber nicht direkt im Standard-Log-Format
# Daher fokussieren wir uns auf verdächtige Request-Patterns

# Bekannte Bad Bot Patterns (in URL oder User-Agent-Header)
failregex = ^<HOST>.*"GET /.*bot.*".*$
            ^<HOST>.*"GET /.*crawler.*".*$
            ^<HOST>.*"GET /.*scraper.*".*$
            ^<HOST>.*"GET /.*spider.*".*$

# Verdächtige User-Agents (falls im Log enthalten)
# Hinweis: Standard Apache-Log enthält keinen User-Agent, 
# aber wenn CustomLog mit "%{User-Agent}i" verwendet wird, funktioniert dies

ignoreregex = ^<HOST>.*"GET /robots\.txt.*".*$
              ^<HOST>.*"GET /sitemap\.xml.*".*$
