# Fail2ban filter für Gunicorn-Fehler
# 
# Erkennt IPs die viele 500-Fehler verursachen (mögliche Angriffe)

[Definition]
# 500-Fehler in Gunicorn Access-Logs
# Format: IP - - [timestamp] "METHOD /path HTTP/1.1" STATUS SIZE "referer" "user-agent" DURATION
failregex = ^<HOST>.*" .*" 500 .*$

# Error-Logs enthalten meist keine IP, daher nur Access-Logs verwenden
# Für Error-Logs müsste man die IP aus dem Request-Kontext extrahieren

# Ignoriere normale Fehler ohne IP (System-Fehler)
ignoreregex = ^.*\[ERROR\].*Internal Server Error.*$
              ^.*\[ERROR\].*Worker.*timeout.*$
              ^.*\[ERROR\].*Connection.*refused.*$
              ^.*Traceback.*$
              ^.*Exception.*$
