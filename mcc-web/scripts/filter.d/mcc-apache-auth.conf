# Fail2ban filter für fehlgeschlagene Authentifizierungsversuche in Apache-Logs
# 
# Erkennt:
# - 401 Unauthorized
# - 403 Forbidden (bei Login-Versuchen)

[Definition]
# Apache Access-Log Format: %h %l %u %t %{SSL_PROTOCOL}x %{SSL_CIPHER}x "%r" %>s %b
# Oder: %h %l %u %t "%r" %>s %b
# %h = Remote host (IP-Adresse)
# %>s = Status code

# 401/403 Fehler bei Login-Endpunkten
failregex = ^<HOST>.*"POST /admin/login/.*" (401|403) .*$
            ^<HOST>.*"POST.*/api/.*" (401|403) .*$
            ^<HOST>.*"GET /admin/login/.*" (401|403) .*$
            ^<HOST>.*"POST /admin/login/.*" (401|403)$
            ^<HOST>.*"POST.*/api/.*" (401|403)$

ignoreregex =
