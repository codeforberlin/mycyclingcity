# Fail2ban filter für Bruteforce-Angriffe in Apache-Logs
# 
# Erkennt viele 403/401 Fehler in kurzer Zeit (Bruteforce-Angriffe)

[Definition]
# Apache Access-Log Format: %h %l %u %t "%r" %>s %b
# Viele 403/401 Fehler in kurzer Zeit
failregex = ^<HOST>.*"POST /admin/login/.*" (403|401) .*$
            ^<HOST>.*"POST.*/api/.*" (403|401) .*$
            ^<HOST>.*"GET /admin/login/.*" (403|401) .*$
            ^<HOST>.*"POST /admin/login/.*" (403|401)$
            ^<HOST>.*"POST.*/api/.*" (403|401)$

ignoreregex =
