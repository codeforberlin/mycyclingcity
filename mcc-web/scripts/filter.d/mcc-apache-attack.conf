# Fail2ban filter für Angriffsversuche (SQL-Injection, XSS, etc.) in Apache-Logs
# 
# Erkennt:
# - SQL-Injection-Versuche
# - XSS-Versuche
# - Path-Traversal-Versuche
# - Command-Injection-Versuche
# - Suspicious Request Patterns

[Definition]
# Apache Access-Log Format: %h %l %u %t "%r" %>s %b
# %r = Request line (METHOD /path?query HTTP/version)

# SQL-Injection Patterns in Request-URLs
failregex = ^<HOST>.*"GET /.*\?.*UNION.*SELECT.*".*$
            ^<HOST>.*"GET /.*\?.*OR.*1=1.*".*$
            ^<HOST>.*"GET /.*\?.*';.*DROP.*TABLE.*".*$
            ^<HOST>.*"GET /.*\?.*EXEC.*\(.*".*$
            ^<HOST>.*"GET /.*\?.*xp_cmdshell.*".*$
            ^<HOST>.*"GET /.*\?.*UNION.*ALL.*SELECT.*".*$
            ^<HOST>.*"GET /.*\?.*CONCAT.*\(.*".*$
            ^<HOST>.*"POST /.*\?.*UNION.*SELECT.*".*$
            ^<HOST>.*"POST /.*\?.*OR.*1=1.*".*$
            ^<HOST>.*"GET /.*UNION.*SELECT.*".*$
            ^<HOST>.*"GET /.*OR.*1=1.*".*$
            ^<HOST>.*"POST /.*UNION.*SELECT.*".*$

# XSS Patterns in Request-URLs
            ^<HOST>.*"GET /.*<script.*>.*".*$
            ^<HOST>.*"GET /.*javascript:.*".*$
            ^<HOST>.*"GET /.*onerror=.*".*$
            ^<HOST>.*"GET /.*onload=.*".*$
            ^<HOST>.*"GET /.*onclick=.*".*$
            ^<HOST>.*"GET /.*alert\(.*\).*".*$
            ^<HOST>.*"GET /.*eval\(.*\).*".*$

# Path Traversal
            ^<HOST>.*"GET /.*\.\./.*".*$
            ^<HOST>.*"GET /.*\.\.\\\.\.\\\.\.\\\.\..*".*$
            ^<HOST>.*"GET /.*/etc/passwd.*".*$
            ^<HOST>.*"GET /.*/proc/self/environ.*".*$

# Command Injection
            ^<HOST>.*"GET /.*\?.*;.*ls.*".*$
            ^<HOST>.*"GET /.*\?.*\|.*cat.*".*$
            ^<HOST>.*"GET /.*\?.*`.*whoami.*`.*".*$
            ^<HOST>.*"GET /.*\?.*\$\(.*\).*".*$

# Suspicious Request Patterns
            ^<HOST>.*"GET /.*wp-admin.*".*$
            ^<HOST>.*"GET /.*phpmyadmin.*".*$
            ^<HOST>.*"GET /.*\.env.*".*$
            ^<HOST>.*"GET /.*\.git.*".*$
            ^<HOST>.*"GET /.*\.sql.*".*$
            ^<HOST>.*"GET /.*config\.php.*".*$
            ^<HOST>.*"GET /.*wp-login\.php.*".*$

ignoreregex =
