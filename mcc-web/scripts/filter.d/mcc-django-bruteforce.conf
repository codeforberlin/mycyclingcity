# Fail2ban filter für Bruteforce-Angriffe
# 
# Erkennt viele 403/401 Fehler in kurzer Zeit (Bruteforce-Angriffe)

[Definition]
# Viele 403/401 Fehler in kurzer Zeit
# Gunicorn Access-Log Format: IP - - [timestamp] "METHOD /path HTTP/1.1" STATUS SIZE "referer" "user-agent" DURATION
failregex = ^<HOST>.*"POST /admin/login/.*" (403|401) .*$
            ^<HOST>.*"POST.*/api/.*" (403|401) .*$
            ^<HOST>.*"GET /admin/login/.*" (403|401) .*$

# Django-Logs (ohne IP, da IP nicht direkt im Log steht)
            ^.*\[WARNING\].*AuthenticationFailed.*$
            ^.*\[ERROR\].*403.*Forbidden.*$
            ^.*\[ERROR\].*401.*Unauthorized.*$

ignoreregex =
