# Fail2ban filter für Script/Datei-Scanner in Apache-Logs
# 
# Erkennt IPs die versuchen, Scripts, Config-Dateien oder Backups zu scannen

[Definition]
# Apache Access-Log Format: %h %l %u %t "%r" %>s %b
# Erkennt Versuche, Scripts, Config-Dateien oder Backups zu scannen

failregex = ^<HOST>.*"GET /.*\.php.*".*$
            ^<HOST>.*"GET /.*\.asp.*".*$
            ^<HOST>.*"GET /.*\.jsp.*".*$
            ^<HOST>.*"GET /.*\.sh.*".*$
            ^<HOST>.*"GET /.*\.py.*".*$
            ^<HOST>.*"GET /.*\.pl.*".*$
            ^<HOST>.*"GET /.*\.cgi.*".*$
            ^<HOST>.*"GET /.*\.bak.*".*$
            ^<HOST>.*"GET /.*\.backup.*".*$
            ^<HOST>.*"GET /.*\.old.*".*$
            ^<HOST>.*"GET /.*\.tmp.*".*$
            ^<HOST>.*"GET /.*\.log.*".*$
            ^<HOST>.*"GET /.*\.conf.*".*$
            ^<HOST>.*"GET /.*\.ini.*".*$
            ^<HOST>.*"GET /.*\.env.*".*$
            ^<HOST>.*"GET /.*\.git.*".*$
            ^<HOST>.*"GET /.*\.svn.*".*$
            ^<HOST>.*"GET /.*\.sql.*".*$
            ^<HOST>.*"GET /.*\.db.*".*$

# Ignoriere legitime Requests (falls Django/Python-Dateien erlaubt sind)
ignoreregex = ^<HOST>.*"GET /static/.*".*$
              ^<HOST>.*"GET /media/.*".*$
              ^<HOST>.*"GET /admin/.*".*$
