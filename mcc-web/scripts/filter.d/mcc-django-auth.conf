# Fail2ban filter für fehlgeschlagene Authentifizierungsversuche
# 
# Erkennt:
# - 401 Unauthorized
# - 403 Forbidden (bei Login-Versuchen)
# - Django AuthenticationFailed Exceptions
# - Invalid API key Versuche

[Definition]
# Fehlgeschlagene Authentifizierung in Django-Logs
# Format: [LEVEL] timestamp module process thread message
failregex = ^.*\[WARNING\].*AuthenticationFailed.*$
            ^.*\[ERROR\].*Invalid.*API.*key.*$
            ^.*\[WARNING\].*Invalid.*credentials.*$
            ^.*\[WARNING\].*Permission denied.*$
            ^.*\[ERROR\].*403.*Forbidden.*$
            ^.*\[ERROR\].*401.*Unauthorized.*$

# Gunicorn Access-Log: 401/403 Fehler
# Format: IP - - [timestamp] "METHOD /path HTTP/1.1" STATUS SIZE "referer" "user-agent" DURATION
            ^<HOST>.*"POST /admin/login/.*" (401|403) .*$
            ^<HOST>.*"POST.*/api/.*" (401|403) .*$
            ^<HOST>.*"GET /admin/login/.*" (401|403) .*$

ignoreregex =
