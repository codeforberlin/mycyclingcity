# Fail2ban filter für Scanner/Prober (viele 404-Fehler)
# 
# Erkennt IPs die viele 404-Fehler verursachen (typisch für Scanner)

[Definition]
# 404-Fehler in Gunicorn Access-Logs
# Format: IP - - [timestamp] "METHOD /path HTTP/1.1" STATUS SIZE "referer" "user-agent" DURATION
failregex = ^<HOST>.*"GET /.*" 404 .*$
            ^<HOST>.*"POST /.*" 404 .*$
            ^<HOST>.*"HEAD /.*" 404 .*$

# Ignoriere normale 404s für statische Dateien, Favicon, etc.
ignoreregex = ^<HOST>.*"GET /static/.*" 404 .*$
              ^<HOST>.*"GET /media/.*" 404 .*$
              ^<HOST>.*"GET /favicon\.ico.*" 404 .*$
              ^<HOST>.*"GET /robots\.txt.*" 404 .*$
              ^<HOST>.*"GET /sitemap\.xml.*" 404 .*$
