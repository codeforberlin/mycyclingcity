# MyCyclingCity Log-Rotation Konfiguration
# 
# Installation:
#   sudo cp /data/appl/mcc/mcc-web/scripts/mcc-logrotate.conf /etc/logrotate.d/mcc
#   sudo chmod 644 /etc/logrotate.d/mcc
#
# Test:
#   sudo logrotate -d /etc/logrotate.d/mcc
#   sudo logrotate -f /etc/logrotate.d/mcc

/data/var/mcc/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 mcc mcc
    sharedscripts
    postrotate
        # Sende HUP-Signal an Gunicorn, damit Log-Handler neu geöffnet werden
        # Nur wenn Gunicorn läuft
        if [ -f /data/var/mcc/tmp/mcc-web.pid ]; then
            kill -HUP $(cat /data/var/mcc/tmp/mcc-web.pid) 2>/dev/null || true
        fi
    endscript
}

# Backup-Logs separat rotieren (längere Aufbewahrung)
/data/var/mcc/logs/backup_*.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 mcc mcc
}

# Gunicorn-Logs separat rotieren
/data/var/mcc/logs/gunicorn_*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 mcc mcc
    sharedscripts
    postrotate
        if [ -f /data/var/mcc/tmp/mcc-web.pid ]; then
            kill -HUP $(cat /data/var/mcc/tmp/mcc-web.pid) 2>/dev/null || true
        fi
    endscript
}
